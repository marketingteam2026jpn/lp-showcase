<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ウェルグラム診断 — 質問</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0d9488;--teal-l:#99f6e4;--teal-bg:#f0fdfa;--text:#1e293b;--sub:#64748b;--xs:#94a3b8;--white:#fff;--bg:#f8fafc;--border:#e2e8f0;--r:14px}
body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.nav{background:var(--white);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{font-size:18px;font-weight:900;color:var(--teal)}
.nav-q{font-size:12px;color:var(--sub);font-weight:600}

/* Progress */
.progress-wrap{background:var(--white);border-bottom:1px solid var(--border);padding:10px 24px}
.progress-bar-bg{height:6px;background:var(--border);border-radius:9999px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--teal-l),var(--teal));border-radius:9999px;transition:width .4s cubic-bezier(.25,.46,.45,.94);width:0}
.progress-text{font-size:11px;color:var(--xs);margin-top:4px;text-align:right}

/* Quiz container */
.quiz-shell{max-width:640px;margin:0 auto;padding:32px 20px 80px}
.q-card{display:none;animation:fadeIn .35s ease}
.q-card.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.q-section{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:1px;margin-bottom:6px}
.q-num{font-size:13px;color:var(--sub);font-weight:600;margin-bottom:8px}
.q-text{font-size:18px;font-weight:800;line-height:1.6;margin-bottom:24px}

/* Options */
.options{display:flex;flex-direction:column;gap:10px}

/* Scale options (1-5) for Q1-Q14 */
.scale-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--xs);margin-bottom:8px;padding:0 4px}
.scale-options{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.scale-btn{width:56px;height:56px;border-radius:50%;border:2px solid var(--border);background:var(--white);font-size:18px;font-weight:800;color:var(--sub);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.scale-btn:hover{border-color:var(--teal-l);background:var(--teal-bg)}
.scale-btn.selected{border-color:var(--teal);background:var(--teal);color:#fff}

/* Choice options (3 choices) for Q15-Q41 */
.choice-btn{display:flex;align-items:center;gap:12px;padding:16px 20px;border:2px solid var(--border);border-radius:var(--r);background:var(--white);cursor:pointer;transition:all .2s;font-size:15px;font-weight:600;text-align:left;width:100%}
.choice-btn:hover{border-color:var(--teal-l);background:var(--teal-bg)}
.choice-btn.selected{border-color:var(--teal);background:var(--teal-bg)}
.choice-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
.choice-btn.selected .choice-dot{border-color:var(--teal);background:var(--teal)}
.choice-btn.selected .choice-dot::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}

/* Nav buttons */
.q-nav{display:flex;gap:12px;margin-top:28px}
.q-nav-btn{flex:1;padding:14px;border-radius:9999px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-back{background:var(--white);color:var(--sub);border:1.5px solid var(--border)}
.btn-back:hover{background:var(--bg)}
.btn-next{background:var(--teal);color:#fff}
.btn-next:hover{opacity:.9}
.btn-next:disabled{opacity:.4;cursor:not-allowed}

/* Loading */
.loading-screen{display:none;text-align:center;padding:80px 20px}
.loading-screen.active{display:block;animation:fadeIn .5s}
.loading-spinner{width:48px;height:48px;border:4px solid var(--border);border-top:4px solid var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:16px;font-weight:700;color:var(--sub)}
.loading-sub{font-size:13px;color:var(--xs);margin-top:8px}

/* ======== RESULT PAGE ======== */
.result-page{display:none;max-width:640px;margin:0 auto;padding:32px 20px 80px}
.result-page.active{display:block;animation:fadeIn .5s}

.result-header{text-align:center;margin-bottom:32px}
.result-label{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:1px;margin-bottom:8px}
.result-type-en{font-size:14px;font-weight:700;color:var(--sub);margin-bottom:4px}
.result-type-jp{font-size:32px;font-weight:900;margin-bottom:8px}
.result-img{width:180px;height:180px;margin:0 auto 16px}
.result-img img{width:100%;height:100%}
.result-motto{font-size:16px;font-weight:700;color:var(--teal);margin-bottom:16px;font-style:italic}

/* Axis bars */
.axis-bars{margin-bottom:32px}
.ab-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ab-label{font-size:12px;font-weight:700;width:40px;text-align:right;flex-shrink:0}
.ab-bar-bg{flex:1;height:10px;background:var(--border);border-radius:9999px;overflow:hidden;position:relative}
.ab-bar{height:100%;border-radius:9999px;transition:width 1s cubic-bezier(.25,.46,.45,.94)}
.ab-pct{font-size:12px;font-weight:700;width:40px;flex-shrink:0;color:var(--sub)}

/* Result card */
.r-card{background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);padding:20px;margin-bottom:16px}
.r-card-title{font-size:14px;font-weight:800;color:var(--teal);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.r-card-title .r-icon{font-size:18px}
.r-card p,.r-card li{font-size:14px;line-height:1.8;color:var(--sub)}
.r-card ul{padding-left:20px;margin-top:8px}
.r-card li{margin-bottom:4px}

/* Factor top5 */
.factor-list{display:flex;flex-direction:column;gap:10px}
.factor-row{display:flex;align-items:center;gap:12px}
.factor-rank{width:28px;height:28px;border-radius:50%;background:var(--teal);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.factor-rank.r2{background:#3b82f6}
.factor-rank.r3{background:#8b5cf6}
.factor-rank.r4{background:#f59e0b}
.factor-rank.r5{background:#94a3b8}
.factor-name{font-size:14px;font-weight:700;flex-shrink:0;width:110px}
.factor-bar-bg{flex:1;height:8px;background:var(--border);border-radius:9999px;overflow:hidden}
.factor-bar{height:100%;border-radius:9999px;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}
.factor-score{font-size:12px;font-weight:700;color:var(--sub);width:24px;text-align:right}

/* Top1 factor detail */
.top1-card{background:linear-gradient(135deg,var(--teal-bg),#e0f2fe);border:1.5px solid var(--teal-l);border-radius:var(--r);padding:24px;margin-bottom:16px}
.top1-label{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:1px;margin-bottom:4px}
.top1-name{font-size:22px;font-weight:900;margin-bottom:12px}
.top1-desc{font-size:14px;line-height:1.8;color:var(--sub);margin-bottom:16px}
.top1-actions{font-size:13px;line-height:1.8;color:var(--text)}

/* Compat */
.compat-row{display:flex;gap:12px;margin-top:12px}
.compat-card{flex:1;background:var(--bg);border-radius:12px;padding:14px;text-align:center}
.compat-card img{width:60px;height:60px;margin-bottom:6px}
.compat-type{font-size:12px;font-weight:700}
.compat-rel{font-size:10px;color:var(--xs)}

/* Share */
.share-section{text-align:center;margin-top:32px;padding:24px;background:var(--white);border-radius:var(--r);border:1.5px solid var(--border)}
.share-title{font-size:16px;font-weight:800;margin-bottom:16px}
.share-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.share-btn{padding:10px 20px;border-radius:9999px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all .2s}
.share-btn:hover{background:var(--teal-bg);border-color:var(--teal-l)}
.retry-btn{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:12px 28px;border-radius:9999px;background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">Wellulu</a>
  <div class="nav-q" id="navQ">Q1 / 41</div>
</nav>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-text" id="progressText">0%</div>
</div>

<div class="quiz-shell" id="quizShell"></div>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-spinner"></div>
  <div class="loading-text">あなたの診断結果を分析中...</div>
  <div class="loading-sub">3つの軸と21因子からタイプを判定しています</div>
</div>

<div class="result-page" id="resultPage"></div>

<script>
// ===== DATA =====
var QUESTIONS = [
  // === Q1-Q7: 軸A (外向↔内向) — 5段階スケール ===
  {id:1,section:"軸A：エネルギーの向き",text:"嬉しい出来事があったとき、最初にしたいのは？",type:"scale",left:"誰かに話す",right:"一人で味わう",axis:"A"},
  {id:2,section:"軸A：エネルギーの向き",text:"休日が丸一日空いたら？",type:"scale",left:"人と会う予定を入れる",right:"一人の時間を楽しむ",axis:"A"},
  {id:3,section:"軸A：エネルギーの向き",text:"初対面の人が多い場では？",type:"scale",left:"ワクワクする",right:"少し疲れる",axis:"A"},
  {id:4,section:"軸A：エネルギーの向き",text:"アイデアが浮かびやすいのは？",type:"scale",left:"人と話している時",right:"一人で考えている時",axis:"A"},
  {id:5,section:"軸A：エネルギーの向き",text:"集まりのあと、どちらを感じやすい？",type:"scale",left:"元気が出る",right:"少し疲れる",axis:"A"},
  {id:6,section:"軸A：エネルギーの向き",text:"意見が対立した場面では？",type:"scale",left:"その場で話し合いたい",right:"一度持ち帰って考えたい",axis:"A"},
  {id:7,section:"軸A：エネルギーの向き",text:"作業するならどちらが心地よい？",type:"scale",left:"にぎやかな場所",right:"静かな場所",axis:"A"},
  // === Q8-Q14: 軸B (成長↔安定) — 5段階スケール ===
  {id:8,section:"軸B：エネルギーの性質",text:"最近うれしかった出来事は？",type:"scale",left:"新しい発見があった",right:"穏やかに過ごせた",axis:"B"},
  {id:9,section:"軸B：エネルギーの性質",text:"多少の不安があっても？",type:"scale",left:"挑戦したい",right:"安心を優先したい",axis:"B"},
  {id:10,section:"軸B：エネルギーの性質",text:"生活で優先したいのは？",type:"scale",left:"成長の機会",right:"安定した日常",axis:"B"},
  {id:11,section:"軸B：エネルギーの性質",text:"調子を崩したときは？",type:"scale",left:"何か行動して気分を変える",right:"じっくり休んで回復する",axis:"B"},
  {id:12,section:"軸B：エネルギーの性質",text:"モチベーションが上がるのは？",type:"scale",left:"新しい目標ができたとき",right:"今あるものに感謝できたとき",axis:"B"},
  {id:13,section:"軸B：エネルギーの性質",text:"理想の休日に近いのは？",type:"scale",left:"刺激的で新しい体験",right:"いつもの安心できる過ごし方",axis:"B"},
  {id:14,section:"軸B：エネルギーの性質",text:"どちらの日々を求めていますか？",type:"scale",left:"変化に富んだ毎日",right:"穏やかな毎日",axis:"B"},
  // === Q15-Q19: 軸C (自己/他者/自然) — 3択 ===
  {id:15,section:"軸C：幸せの方向性",text:"疲れを感じたとき、回復につながりやすいのは？",type:"choice3",options:["一人で考えや気持ちを整理する","誰かと話して気分を切り替える","外に出て自然光や風を感じる"],mapping:["自己","他者","自然"],axis:"C"},
  {id:16,section:"軸C：幸せの方向性",text:"「自分らしくいられる」と感じやすいのはどんなとき？",type:"choice3",options:["一人で過ごしているとき","人と関わり合うとき","自然の中や屋外で過ごしているとき"],mapping:["自己","他者","自然"],axis:"C"},
  {id:17,section:"軸C：幸せの方向性",text:"生活の中で、意外と影響が大きいのは？",type:"choice3",options:["自分の考え方や気持ちの状態","周囲の人間関係や雰囲気","日当たり・空気・緑などの環境"],mapping:["自己","他者","自然"],axis:"C"},
  {id:18,section:"軸C：幸せの方向性",text:"もし今すぐ1つだけ増やせるとしたら？",type:"choice3",options:["自分のための静かな時間","人と関われる機会","自然を感じられる環境や習慣"],mapping:["自己","他者","自然"],axis:"C"},
  {id:19,section:"軸C：幸せの方向性",text:"無意識に「これは避けたい」と感じやすいのは？",type:"choice3",options:["自分の考えやペースを乱される状況","人間関係がぎくしゃくする状況","騒音・人工的すぎる環境に長くいること"],mapping:["自己","他者","自然"],axis:"C"},
  // === Q20-Q40: 21因子 — 3択 ===
  {id:20,section:"ウェルビーイング因子",text:"最近「今日は調子いいな」と感じる瞬間に近いのは？",type:"choice3",options:["ぐっすり眠れた朝","気を使わず話せる人といた時間","「へえ」と思うことに出会った瞬間"],mapping:["良質な睡眠","仲間との時間","新しい発見"]},
  {id:21,section:"ウェルビーイング因子",text:"予定が急にキャンセルになりました。まず何をしますか？",type:"choice3",options:["少し体を動かす","何もせず休む","誰かに連絡する"],mapping:["適度な運動","休養時間","積極的な参加"]},
  {id:22,section:"ウェルビーイング因子",text:"「悪くない一日だったな」と思えるのは、どんな日？",type:"choice3",options:["食事のバランスが整っていた日","イライラせず過ごせた日","時間を有効に使えた日"],mapping:["バランス良い食事","ストレスフリー","有意義な時間"]},
  {id:23,section:"ウェルビーイング因子",text:"理想的な休日に、一番近いのは？",type:"choice3",options:["自然の中でのんびり","学びや刺激がある時間","家族が安心して笑っている"],mapping:["自然との触れ合い","生涯の学び","家族の成長・安心"]},
  {id:24,section:"ウェルビーイング因子",text:"最近、満足感が高かったのはどれ？",type:"choice3",options:["新しい挑戦をしたこと","新しい人と出会えたこと","心が落ち着いていたこと"],mapping:["挑戦できる環境","人との出会い","感謝・賞賛"]},
  {id:25,section:"ウェルビーイング因子",text:"時間とエネルギーを使うなら、どれに使いたい？",type:"choice3",options:["身だしなみや見た目を整える","誰かの役に立つ行動","自分の成長につながること"],mapping:["外見のきれいさ","社会貢献","生涯の学び"]},
  {id:26,section:"ウェルビーイング因子",text:"「今日はよく頑張った」と思った日のご褒美は？",type:"choice3",options:["おいしいものを食べる","居心地のいい場所で過ごす","感謝された・認められた実感を味わう"],mapping:["おいしい食事","心地よい空間","感謝・賞賛"]},
  {id:27,section:"ウェルビーイング因子",text:"最近「足りていないかも」と感じるのは？",type:"choice3",options:["しっかり休む時間","助け合える関係","新しい刺激"],mapping:["休養時間","相互協力","挑戦できる環境"]},

  {id:30,section:"ウェルビーイング因子",text:"気分を切り替えたいとき、選ぶのは？",type:"choice3",options:["体を動かす","おいしいものを食べる","感謝を伝える・受け取る"],mapping:["適度な運動","おいしい食事","感謝・賞賛"]},
  {id:31,section:"ウェルビーイング因子",text:"「これがあると安心する」と思うのは？",type:"choice3",options:["落ち着ける空間","協力し合える関係","家族の安定"],mapping:["心地よい空間","相互協力","家族の成長・安心"]},

  {id:40,section:"ウェルビーイング因子",text:"今、整えたいと思っているのは？",type:"choice3",options:["体調管理・改善","前向きに関われる場","時間の余裕"],mapping:["バランス良い食事","社会貢献","休養時間"]}

// Type master data (from spreadsheet)
var TYPE_MAP = {
  "外向|成長|自己":{no:1,name1:"冒険者",name2:"チャレンジャー",img:"01-achiever.svg",motto:"動くほど、自分が見えてくる",

// ===== ENGINE =====
var answers = {};
var currentQ = 0;
var totalQ = QUESTIONS.length;

function init(){
  var shell = document.getElementById('quizShell');
  var html = '';
  QUESTIONS.forEach(function(q, i){
    html += '<div class="q-card" id="q'+i+'" '+(i===0?'style="display:block"':'')+'>';
    html += '<div class="q-section">'+q.section+'</div>';
    html += '<div class="q-num">Q'+(i+1)+' / '+totalQ+'</div>';
    html += '<div class="q-text">'+q.text+'</div>';
    if(q.type==='scale'){
      html += '<div class="scale-labels"><span>'+q.left+'</span><span>'+q.right+'</span></div>';
      html += '<div class="scale-options">';
      for(var s=1;s<=5;s++){
        html += '<button class="scale-btn" data-q="'+i+'" data-v="'+s+'">'+s+'</button>';
      }
      html += '</div>';
    } else {
      html += '<div class="options">';
      q.options.forEach(function(opt, oi){
        html += '<button class="choice-btn" data-q="'+i+'" data-v="'+oi+'"><div class="choice-dot"></div>'+opt+'</button>';
      });
      html += '</div>';
    }
    html += '<div class="q-nav">';
    if(i>0) html += '<button class="q-nav-btn btn-back" onclick="goQ('+(i-1)+')">戻る</button>';
    if(i<totalQ-1) html += '<button class="q-nav-btn btn-next" id="next'+i+'" onclick="goQ('+(i+1)+')" disabled>次へ</button>';
    else html += '<button class="q-nav-btn btn-next" id="next'+i+'" onclick="submitQuiz()" disabled>診断結果を見る</button>';
    html += '</div></div>';
  });
  shell.innerHTML = html;

  // Bind click events
  document.querySelectorAll('.scale-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var qi = parseInt(b.dataset.q);
      var v = parseInt(b.dataset.v);
      answers[qi] = v;
      b.parentElement.querySelectorAll('.scale-btn').forEach(function(s){s.classList.remove('selected')});
      b.classList.add('selected');
      document.getElementById('next'+qi).disabled = false;
      // Auto-advance after short delay
      setTimeout(function(){if(qi<totalQ-1)goQ(qi+1)},350);
    });
  });
  document.querySelectorAll('.choice-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var qi = parseInt(b.dataset.q);
      var v = parseInt(b.dataset.v);
      answers[qi] = v;
      b.parentElement.querySelectorAll('.choice-btn').forEach(function(s){s.classList.remove('selected')});
      b.classList.add('selected');
      document.getElementById('next'+qi).disabled = false;
      setTimeout(function(){if(qi<totalQ-1)goQ(qi+1)},350);
    });
  });
  updateProgress();
}

function goQ(idx){
  document.querySelectorAll('.q-card').forEach(function(c){c.style.display='none';c.classList.remove('active')});
  var el = document.getElementById('q'+idx);
  el.style.display='block';
  setTimeout(function(){el.classList.add('active')},10);
  currentQ = idx;
  updateProgress();
  // Restore selection
  if(answers[idx]!==undefined){
    document.getElementById('next'+idx).disabled=false;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateProgress(){
  var answered = Object.keys(answers).length;
  var pct = Math.round((answered/totalQ)*100);
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressText').textContent = answered+'/'+totalQ+' ('+pct+'%)';
  document.getElementById('navQ').textContent = 'Q'+(currentQ+1)+' / '+totalQ;
}

function submitQuiz(){
  // Show loading
  document.getElementById('quizShell').style.display='none';
  document.querySelector('.progress-wrap').style.display='none';
  var ls = document.getElementById('loadingScreen');
  ls.classList.add('active');

  setTimeout(function(){
    var result = calculate();
    ls.classList.remove('active');
    ls.style.display='none';
    showResult(result);
  }, 2500);
}

// ===== ALGORITHM =====
function calculate(){
  // STEP1: Axis A (Q0-Q6, values 1-5) — sum > 14 = 内向
  var sumA = 0;
  for(var i=0;i<7;i++) sumA += (answers[i]||3);
  var axisA = sumA > 14 ? "内向" : "外向";
  var pctA_in = Math.round((sumA/35)*100);
  var pctA_ex = 100 - pctA_in;

  // STEP2: Axis B (Q7-Q13, values 1-5) — sum > 14 = 安定
  var sumB = 0;
  for(var i=7;i<14;i++) sumB += (answers[i]||3);
  var axisB = sumB > 14 ? "安定" : "成長";
  var pctB_st = Math.round((sumB/35)*100);
  var pctB_gr = 100 - pctB_st;

  // STEP3: Axis C (Q14-Q18, choice index 0=自己,1=他者,2=自然)
  var cCounts = {"自己":0,"他者":0,"自然":0};
  for(var i=14;i<19;i++){
    var v = answers[i];
    if(v!==undefined){
      var m = QUESTIONS[i].mapping[v];
      cCounts[m]++;
    }
  }
  var axisC;
  if(cCounts["自己"]>=3) axisC = "自己";
  else if(cCounts["他者"]>=3) axisC = "他者";
  else if(cCounts["自然"]>=2) axisC = "自然";
  else axisC = "自己";

  // STEP4: Type lookup
  var key = axisA+"|"+axisB+"|"+axisC;
  var typeData = TYPE_MAP[key];

  // STEP5: 21 factors (Q19-Q39)
  var factors = {};
  for(var i=19;i<QUESTIONS.length;i++){
    var v = answers[i];
    if(v!==undefined){
      var factorName = QUESTIONS[i].mapping[v];
      factors[factorName] = (factors[factorName]||0) + 1;
    }
  }
  // Add tiny random for tie-breaking
  var factorArr = [];
  var allFactors = Object.keys(FACTOR_DATA);
  allFactors.forEach(function(f){
    factorArr.push({name:f, score:(factors[f]||0) + Math.random()*0.01});
  });
  factorArr.sort(function(a,b){return b.score - a.score});
  var top5 = factorArr.slice(0,5).map(function(f){return {name:f.name, score:Math.floor(f.score)}});

  return {
    axisA:axisA, axisB:axisB, axisC:axisC,
    pctA_in:pctA_in, pctA_ex:pctA_ex,
    pctB_st:pctB_st, pctB_gr:pctB_gr,
    cCounts:cCounts, type:typeData, top5:top5
  };
}

function shareResult(platform){
  var text = "ウェルグラム12タイプ診断を受けました！あなたも自分の\"幸せのカタチ\"を見つけてみませんか？";
  var url = window.location.href.replace('quiz.html','index.html');
  if(platform==='x'){
    window.open('https://x.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank');
  } else if(platform==='line'){
    window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(url)+'&text='+encodeURIComponent(text),'_blank');
  } else {
    navigator.clipboard.writeText(url).then(function(){alert('リンクをコピーしました！')});
  }
}
