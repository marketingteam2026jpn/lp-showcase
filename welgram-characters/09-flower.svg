<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="1080" height="1080">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E4F5F2"/>
      <stop offset="100%" stop-color="#D0EDE8"/>
    </linearGradient>
    <linearGradient id="body9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#3DA69C"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg9)"/>
  <ellipse cx="200" cy="360" rx="70" ry="12" fill="#66CCBB" opacity="0.3"/>
  <!-- Water ripples at feet -->
  <ellipse cx="200" cy="355" rx="50" ry="6" fill="none" stroke="#66CCBB" stroke-width="1" opacity="0.3"/>
  <ellipse cx="200" cy="355" rx="70" ry="8" fill="none" stroke="#66CCBB" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="200" cy="355" rx="90" ry="10" fill="none" stroke="#66CCBB" stroke-width="0.6" opacity="0.1"/>
  <!-- Body -->
  <ellipse cx="200" cy="260" rx="60" ry="74" fill="url(#body9)"/>
  <!-- Flowing fabric -->
  <path d="M155,290 Q148,320 140,340" stroke="#66CCBB" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M245,290 Q252,320 260,340" stroke="#66CCBB" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Legs -->
  <rect x="172" y="318" width="22" height="30" rx="11" fill="#3DA69C"/>
  <rect x="206" y="318" width="22" height="30" rx="11" fill="#3DA69C"/>
  <ellipse cx="183" cy="350" rx="15" ry="8" fill="#2D968C"/>
  <ellipse cx="217" cy="350" rx="15" ry="8" fill="#2D968C"/>
  <!-- Arms -->
  <rect x="132" y="240" width="22" height="48" rx="11" fill="#3DA69C" transform="rotate(-5 143 240)"/>
  <rect x="246" y="240" width="22" height="48" rx="11" fill="#3DA69C" transform="rotate(5 257 240)"/>
  <!-- Leaf boat on palm -->
  <ellipse cx="125" cy="232" rx="10" ry="8" fill="#3DA69C"/>
  <!-- Leaf boat -->
  <path d="M105,224 Q125,210 145,224" fill="#8AD68A" stroke="#6BC06B" stroke-width="1"/>
  <path d="M125,222 L125,210" stroke="#6BC06B" stroke-width="1.5"/>
  <path d="M125,210 Q132,206 134,212" fill="#A8D5BA" stroke="none"/>
  <!-- Wind lines -->
  <line x1="90" y1="216" x2="110" y2="218" stroke="#66CCBB" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="85" y1="224" x2="102" y2="225" stroke="#66CCBB" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="280" y1="200" x2="300" y2="198" stroke="#66CCBB" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="285" y1="210" x2="302" y2="209" stroke="#66CCBB" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="200" cy="170" r="62" fill="#4DB6AC"/>
  <circle cx="200" cy="165" r="55" fill="#5CC4B8" opacity="0.4"/>
  <!-- Eyes - half-closed, peaceful -->
  <path d="M172,162 Q180,170 188,162" stroke="#1D4A44" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M212,162 Q220,170 228,162" stroke="#1D4A44" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth - serene smile -->
  <path d="M190,182 Q200,190 210,182" stroke="#1D4A44" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="166" cy="178" rx="10" ry="6" fill="#3DA69C" opacity="0.4"/>
  <ellipse cx="234" cy="178" rx="10" ry="6" fill="#3DA69C" opacity="0.4"/>
  <!-- Hair flowing like water -->
  <path d="M148,145 Q138,160 132,180" stroke="#3DA69C" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M252,145 Q262,160 268,180" stroke="#3DA69C" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <text x="200" y="392" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#2D968C" opacity="0.6">The Flow-er</text>
</svg>
