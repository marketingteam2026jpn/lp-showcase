<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="1080" height="1080">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF6E0"/>
      <stop offset="100%" stop-color="#FFEFC0"/>
    </linearGradient>
    <linearGradient id="body7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B960"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg7)"/>
  <ellipse cx="200" cy="360" rx="70" ry="12" fill="#E8C880" opacity="0.3"/>
  <!-- Body -->
  <ellipse cx="200" cy="260" rx="60" ry="74" fill="url(#body7)"/>
  <!-- Vest -->
  <path d="M165,225 L165,295 Q200,305 235,295 L235,225 Q200,215 165,225Z" fill="#D4A843" opacity="0.5"/>
  <line x1="200" y1="220" x2="200" y2="300" stroke="#C49830" stroke-width="1.5" opacity="0.4"/>
  <!-- Legs -->
  <rect x="172" y="318" width="22" height="32" rx="11" fill="#D4A843"/>
  <rect x="206" y="318" width="22" height="32" rx="11" fill="#D4A843"/>
  <ellipse cx="183" cy="352" rx="15" ry="8" fill="#C49830"/>
  <ellipse cx="217" cy="352" rx="15" ry="8" fill="#C49830"/>
  <!-- Left arm - hand on chin (thinking) -->
  <rect x="130" y="235" width="22" height="50" rx="11" fill="#D4A843" transform="rotate(-5 141 235)"/>
  <circle cx="130" cy="225" r="10" fill="#D4A843"/>
  <!-- Right arm holding magnifying glass -->
  <rect x="248" y="220" width="22" height="55" rx="11" fill="#D4A843" transform="rotate(15 259 220)"/>
  <!-- Magnifying glass -->
  <circle cx="290" cy="196" r="20" fill="none" stroke="#8B6914" stroke-width="4"/>
  <circle cx="290" cy="196" r="16" fill="#E8F4FD" opacity="0.6"/>
  <line x1="276" y1="210" x2="264" y2="224" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
  <!-- Lens shine -->
  <path d="M282,186 Q286,182 292,184" stroke="#FFF" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Head -->
  <circle cx="200" cy="170" r="62" fill="#E8B960"/>
  <circle cx="200" cy="165" r="55" fill="#ECC876" opacity="0.4"/>
  <!-- Round glasses -->
  <circle cx="178" cy="162" r="14" fill="none" stroke="#8B6914" stroke-width="2"/>
  <circle cx="222" cy="162" r="14" fill="none" stroke="#8B6914" stroke-width="2"/>
  <line x1="192" y1="162" x2="208" y2="162" stroke="#8B6914" stroke-width="2"/>
  <line x1="164" y1="162" x2="155" y2="158" stroke="#8B6914" stroke-width="2"/>
  <line x1="236" y1="162" x2="245" y2="158" stroke="#8B6914" stroke-width="2"/>
  <!-- Eyes behind glasses - curious -->
  <circle cx="178" cy="163" r="4.5" fill="#5A4020"/>
  <circle cx="222" cy="163" r="4.5" fill="#5A4020"/>
  <circle cx="180" cy="161" r="1.5" fill="#FFF"/>
  <circle cx="224" cy="161" r="1.5" fill="#FFF"/>
  <!-- One eye slightly squinted (examining) -->
  <path d="M216,156 L228,155" stroke="#5A4020" stroke-width="1.5" fill="none"/>
  <!-- Mouth - contemplative "hmm" -->
  <path d="M192,180 Q200,184 208,180" stroke="#5A4020" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="212" cy="178" r="1.5" fill="#5A4020"/>
  <!-- Cheeks -->
  <ellipse cx="164" cy="176" rx="9" ry="5" fill="#D4A843" opacity="0.35"/>
  <ellipse cx="236" cy="176" rx="9" ry="5" fill="#D4A843" opacity="0.35"/>
  <text x="200" y="392" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#B8920A" opacity="0.6">The Seeker</text>
</svg>
